<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TASKR — To Do List</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css">

</head>
<body>
<div class="app">
 
  <!-- Header -->
  <div class="header">
    <div class="logo">TASK<span>R</span></div>
    <div class="stats">
      <div class="stats-count"><strong id="done-count">0</strong> / <span id="total-count">0</span> done</div>
    </div>
  </div>
 
  <!-- Input -->
  <div class="input-wrap">
    <input class="task-input" id="task-input" type="text" placeholder="Add a new task…" maxlength="200" />
    <button class="add-btn" id="add-btn">ADD</button>
  </div>
 
  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>
 
  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
  </div>
 
  <!-- Task list -->
  <div class="task-list" id="task-list"></div>
 
  <!-- Empty state -->
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">◎</div>
    <div class="empty-text">No tasks here</div>
  </div>
 
  <!-- Footer -->
  <div class="footer">
    <button class="clear-btn" id="clear-btn">Clear Completed</button>
  </div>
 
</div>
 
<script src="script.js"></script>
</body>
</html>
